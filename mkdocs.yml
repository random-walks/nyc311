site_name: nyc311
site_url: https://nyc311.readthedocs.io/
site_author: "Blaise Albis-Burdige"

repo_name: "random-walks/nyc311"
repo_url: "https://github.com/random-walks/nyc311"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - search.suggest
    - search.highlight
    - navigation.expand
    - navigation.tracking
    - toc.follow
  palette:
    # See options to customise your color scheme here:
    # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  autorefs: {}
  mkdocstrings:
    handlers:
      python:
        paths: [.]
        options:
          members_order: source
          separate_signature: true
          filters: ["!^_"]
          show_root_heading: true
          show_if_no_docstring: true
          show_signature_annotations: true
  search: {}

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - SDK Guide: sdk.md
  - Examples: examples.md
  - factor-factory integration: integration.md
  - Migration (v0 to v1): migration-v0-to-v1.md
  - Python API: api.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - Releasing: releasing.md
  - Changelog: changelog.md
  - For LLMs / agents: llms.txt
