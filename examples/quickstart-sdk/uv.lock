version = 1
revision = 3
requires-python = ">=3.10"

[[package]]
name = "nyc311"
source = { editable = "../../" }

[package.metadata]
requires-dist = [
    { name = "contextily", marker = "extra == 'all'", specifier = ">=1.6.2" },
    { name = "contextily", marker = "extra == 'spatial'", specifier = ">=1.6.2" },
    { name = "geopandas", marker = "extra == 'all'", specifier = ">=1.1" },
    { name = "geopandas", marker = "extra == 'spatial'", specifier = ">=1.1" },
    { name = "matplotlib", marker = "extra == 'all'", specifier = ">=3.10.8" },
    { name = "matplotlib", marker = "extra == 'plotting'", specifier = ">=3.10.8" },
    { name = "matplotlib", marker = "extra == 'science'", specifier = ">=3.10.8" },
    { name = "pandas", marker = "extra == 'all'", specifier = ">=2.3.3" },
    { name = "pandas", marker = "extra == 'dataframes'", specifier = ">=2.3.3" },
    { name = "pandas", marker = "extra == 'science'", specifier = ">=2.3.3" },
    { name = "scipy", marker = "extra == 'all'", specifier = ">=1.15.3" },
    { name = "scipy", marker = "extra == 'science'", specifier = ">=1.15.3" },
    { name = "shapely", marker = "extra == 'all'", specifier = ">=2.1" },
    { name = "shapely", marker = "extra == 'spatial'", specifier = ">=2.1" },
]
provides-extras = ["all", "dataframes", "plotting", "science", "spatial"]

[package.metadata.requires-dev]
dev = [
    { name = "mypy", specifier = ">=1.18" },
    { name = "pylint", specifier = ">=3.3" },
    { name = "pytest", specifier = ">=9" },
    { name = "pytest-cov", specifier = ">=7" },
    { name = "ruff", specifier = ">=0.12" },
    { name = "typing-extensions", specifier = ">=4.0" },
]
docs = [
    { name = "markdown", specifier = ">=3.9" },
    { name = "mdx-include", specifier = ">=1.4.2" },
    { name = "mkdocs", specifier = ">=1.1.2" },
    { name = "mkdocs-material", specifier = ">=9.1.19" },
    { name = "mkdocstrings-python", specifier = ">=1.18.2" },
    { name = "pyyaml", specifier = ">=6.0.1" },
]
test = [
    { name = "pytest", specifier = ">=9" },
    { name = "pytest-cov", specifier = ">=7" },
    { name = "typing-extensions", specifier = ">=4.0" },
]

[[package]]
name = "nyc311-example-quickstart-sdk"
version = "0.0.0"
source = { virtual = "." }
dependencies = [
    { name = "nyc311" },
]

[package.metadata]
requires-dist = [{ name = "nyc311", editable = "../../" }]
