name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install lint dependencies
        run: uv sync --frozen --group docs --all-extras

      - name: Run Ruff
        run: uv run --frozen ruff check --output-format=github .

      - name: Check Ruff formatting
        run: uv run --frozen ruff format --check .

      - name: Run mypy
        run: uv run --frozen mypy

      - name: Run pylint
        run: uv run --frozen pylint nyc311 --output-format=github

      - name: Run public API audit
        run: uv run --frozen python scripts/audit_public_api.py

      - name: Run repository hygiene hooks
        run: >-
          uvx nox -s lint -- blacken-docs check-added-large-files
          check-case-conflict check-merge-conflict check-symlinks check-yaml
          debug-statements end-of-file-fixer mixed-line-ending name-tests-test
          requirements-txt-fixer trailing-whitespace rst-backticks
          rst-directive-colons rst-inline-touching-normal prettier codespell
          shellcheck disallow-caps validate-pyproject check-dependabot
          check-github-workflows check-readthedocs

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions and validate long description
        run: make ci-build

      - name: Smoke-test installed wheel
        run: make smoke-dist

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Build docs with strict checks
        run: uv run --frozen mkdocs build --strict

  tests:
    name:
      Test full install (${{ matrix.os }}, Python ${{ matrix.python-version }},
      toolkit ${{ matrix.toolkit-channel }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
        toolkit-channel: ["released"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            toolkit-channel: "main"
          - os: macos-latest
            python-version: "3.12"
            toolkit-channel: "released"
          - os: macos-latest
            python-version: "3.13"
            toolkit-channel: "released"
          - os: windows-latest
            python-version: "3.12"
            toolkit-channel: "released"
          - os: windows-latest
            python-version: "3.13"
            toolkit-channel: "released"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install full test environment
        run: uv sync --frozen --all-extras

      - name: Override nyc-geo-toolkit with main branch
        if: matrix.toolkit-channel == 'main'
        shell: bash
        run: >-
          uv pip install --python .venv/bin/python --upgrade --force-reinstall
          "nyc-geo-toolkit @
          git+https://github.com/random-walks/nyc-geo-toolkit.git@main"

      - name: Run full non-live test suite
        shell: bash
        run: >-
          uv run --frozen pytest -m "not integration" -ra --cov --cov-report=xml
          --cov-report=term --junitxml="junit/${{ matrix.os }}-${{
          matrix.toolkit-channel }}-${{ matrix.python-version }}.xml"
          --durations=20

      - name: Publish test results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name:
            Test Results (full non-live, Python ${{ matrix.python-version }},
            toolkit ${{ matrix.toolkit-channel }})
          comment_mode: off
          files:
            junit/${{ matrix.os }}-${{ matrix.toolkit-channel }}-${{
            matrix.python-version }}.xml

      - name: Upload coverage report
        if:
          matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' &&
          matrix.toolkit-channel == 'released'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  pass:
    if: always()
    needs: [lint, build, docs, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
