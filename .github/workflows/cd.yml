name: CD

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions to the configured package index
        required: true
        type: boolean
        default: false
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dist:
    name: Distribution build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: hynek/build-and-inspect-python-package@v2

  publish:
    needs: [dist]
    name: Publish to PyPI
    environment:
      name: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ubuntu-latest
    if: >-
      vars.PYPI_PUBLISH_ENABLED == 'true' && (
        (github.event_name == 'release' && github.event.action == 'published')
      ||
        (github.event_name == 'workflow_dispatch' && inputs.publish == true &&
        startsWith(github.ref, 'refs/tags/'))
      )

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Generate artifact attestation for public releases
        if: github.event.repository.private == false
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Default to TestPyPI until the project is ready for real PyPI.
          # Once trusted publishing is configured for PyPI, remove this line.
          repository-url: https://test.pypi.org/legacy/
